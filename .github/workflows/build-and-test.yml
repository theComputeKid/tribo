#* To avoid duplicate jobs running when both push and PR is satisfied, we use this:
#* https://github.com/orgs/community/discussions/26940#discussioncomment-5686753
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

#* Stop stale workflows when pull requests are updated: https://stackoverflow.com/a/70972844
#* Does not apply to the main branch.
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Add msbuild to PATH
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: x64
      - name: Get latest CMake and Ninja
        uses: lukka/get-cmake@latest
      - name: Install opencppcoverage
        uses: KungFuDonkey/Install-OpenCppCoverage@v1
      - name: Install doxygen
        uses: ssciwr/doxygen-install@v1
        with:
          version: "1.12.0"
      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install python packages
        uses: insightsengineering/pip-action@v2
        with:
          packages: |
            numpy
            scipy
      - name: Build Project
        run: cmake --workflow --preset msvc-all

  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Get latest CMake and Ninja
        uses: lukka/get-cmake@latest
      - name: Install doxygen
        uses: ssciwr/doxygen-install@v1
        with:
          version: "1.12.0"
      - name: Install build deps
        run: sudo apt install gcovr
      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python packages
        uses: insightsengineering/pip-action@v2
        with:
          packages: |
            numpy
            scipy
      - name: Build Project
        run: cmake --workflow --preset gcc-all

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Get latest CMake and Ninja
        uses: lukka/get-cmake@latest
      - name: Install doxygen
        uses: ssciwr/doxygen-install@v1
        with:
          version: "1.12.0"
      - name: Install build deps
        run: brew install gcovr
      - name: Install LLVM and Clang
        uses: ZhongRuoyu/setup-llvm@v0
        with:
          llvm-version: 18
      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python packages
        uses: insightsengineering/pip-action@v2
        with:
          packages: |
            numpy
            scipy
      - name: Build Project
        run: cmake --workflow --preset clang-all
